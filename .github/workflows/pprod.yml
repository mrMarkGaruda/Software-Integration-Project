name: CI - Pre-Production

on:
  push:
    branches:
      - pprod
  pull_request:
    branches:
      - pprod

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: preproduction
      DB_URL: ${{ secrets.PPROD_DB_URL }}
      JWT_SECRET: ${{ secrets.PPROD_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: |
          npm ci
          npm run lint
          npm run test
      - run: |
          echo "DB_URL=${{ secrets.PPROD_DB_URL }}" >> .env
          echo "JWT_SECRET=${{ secrets.PPROD_JWT_SECRET }}" >> .env
      - run: npm run build
      - name: Deploy to Pre-Production Server
        run: |
          # Replace with your actual deployment commands
          ssh ubuntu@pprod.server "cd /app && git pull && pm2 restart all"