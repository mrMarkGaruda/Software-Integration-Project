name: Postman API Tests with Docker

on:
  pull_request:
    branches: [dev, release, pprod, prod]
  workflow_dispatch:  # Allow manual triggering

jobs:
  postman-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4.2.2
    
    # Setup Docker Compose
    - name: Set up Docker Compose
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/download/v2.23.3/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose
    
    # Setup Node.js
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    # Build and start Docker services
    - name: Build and Start Docker Services
      run: |
        docker-compose -f docker-compose.dev.yml up --build -d
        
    # Wait for services to be ready
    - name: Wait for Services to be Ready
      run: |
        # Wait for the app to be ready (adjust timeout and check as needed)
        max_attempts=30
        attempt=0
        while [ $attempt -lt $max_attempts ]; do
          if curl -s http://localhost:8080/api/health > /dev/null; then
            echo "Service is up and running!"
            break
          fi
          echo "Waiting for service to be ready... (attempt $attempt)"
          sleep 5
          attempt=$((attempt+1))
        done
        
        if [ $attempt -eq $max_attempts ]; then
          echo "Service did not become ready in time"
          docker-compose -f docker-compose.dev.yml logs
          exit 1
        fi
    
    # Install Newman CLI globally
    - name: Install Newman
      run: npm install -g newman newman-reporter-htmlextra
    
    # Create directory for test reports
    - name: Create Reports Directory
      run: mkdir -p newman-reports
    
    # Run Postman Collection Tests
    - name: Run Postman Collection Tests
      run: |
        newman run "postman/collection.json" \
          -e "postman/environment.json" \
          -r htmlextra \
          --reporter-htmlextra-export newman-reports/report.html
    
    # Upload test results as artifact
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: postman-test-results
        path: newman-reports
        retention-days: 7
    
    # Stop Docker services
    - name: Stop Docker Services
      if: always()
      run: docker-compose -f docker-compose.dev.yml down
    
    # Check test results and fail if tests fail
    - name: Check Test Results
      run: |
        if [ $(find newman-reports -name "*.html" | wc -l) -eq 0 ]; then
          echo "No test reports found"
          exit 1
        fi