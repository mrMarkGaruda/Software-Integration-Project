name: CI - Pull Requests

on:
  pull_request:
    branches: [dev, release, pprod, prod]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test -- --coverage
      - uses: actions/upload-artifact@v3.1.4
        with:
          name: coverage-report
          path: coverage

  codecov:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v3.1.4
        with:
          name: coverage-report
      - uses: codecov/codecov-action@v5.4.2
        with:
          files: coverage/*.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
