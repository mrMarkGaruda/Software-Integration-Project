name: CD - Pre-Production

on:
  push:
    branches: [pprod]

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '18'
      - run: |
          npm ci
          npm run build
      - run: |
          printf "NODE_ENV=preproduction\nDB_URL=%s\nJWT_SECRET=%s\n" "${{ secrets.PPROD_DB_URL }}" "${{ secrets.PPROD_JWT_SECRET }}" > .env
      - uses: actions/upload-artifact@v3.1.4
        with:
          name: preprod-build
          path: |
            .env
            dist/**

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v3.1.4
        with:
          name: preprod-build
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.PPROD_SERVER }}
          username: ${{ secrets.PPROD_SSH_USER }}
          key: ${{ secrets.PPROD_SSH_KEY }}
          source: ".env,dist/**"
          target: "/var/app"
          script: |
            cd /var/app
            npm ci
            npx pm2 restart all