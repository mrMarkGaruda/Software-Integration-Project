name: CD - Release

on:
  push:
    branches: [release]

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: |
          npm ci
          npm run build
      - run: |
          printf "NODE_ENV=staging\nDB_URL=%s\nJWT_SECRET=%s\n" "${{ secrets.RELEASE_DB_URL }}" "${{ secrets.RELEASE_JWT_SECRET }}" > .env
      - uses: actions/upload-artifact@v3
        with:
          name: release-build
          path: |
            .env
            dist/**

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: release-build
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.RELEASE_SERVER }}
          username: ${{ secrets.RELEASE_SSH_USER }}
          key: ${{ secrets.RELEASE_SSH_KEY }}
          source: ".env,dist/**"
          target: "/var/app"
          script: |
            cd /var/app
            npm ci
            npx pm2 restart all