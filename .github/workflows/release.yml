name: CI - Release

on:
  push:
    branches:
      - release
  pull_request:
    branches:
      - release

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: staging
      DB_URL: ${{ secrets.RELEASE_DB_URL }}
      JWT_SECRET: ${{ secrets.RELEASE_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: |
          npm ci
          npm run lint
          npm run test
      - run: |
          echo "DB_URL=${{ secrets.RELEASE_DB_URL }}" >> .env
          echo "JWT_SECRET=${{ secrets.RELEASE_JWT_SECRET }}" >> .env
      - run: npm run build
      - name: Deploy to Release Server
        run: |
          # Replace with your actual deployment commands
          ssh ubuntu@release.server "cd /app && git pull && pm2 restart all"