name: CI/CD - Development

on:
  push:
    branches: [dev]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '18'
      - run: |
          npm ci
          npm run build
      - run: |
          # Create a proper .env file based on the development template
          cp .env.development .env
          # Override with secrets if provided
          if [ ! -z "${{ secrets.DEV_DB_URL }}" ]; then
            echo "DB_URL=${{ secrets.DEV_DB_URL }}" >> .env
          fi
          if [ ! -z "${{ secrets.DEV_JWT_SECRET }}" ]; then
            echo "JWT_SECRET_KEY=${{ secrets.DEV_JWT_SECRET }}" >> .env
          fi
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.DEV_SERVER }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd /var/app
            # Make sure we have node_modules
            npm ci --only=production
            # Restart the service
            npx pm2 restart all