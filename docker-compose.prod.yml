version: '3.8'

services:
  app:
    container_name: movie-app-prod
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
      args:
        NODE_ENV: production
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
    env_file:
      - .env.production
    depends_on:
      - mongodb
      - postgres
      - redis
    networks:
      - app-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  mongodb:
    image: mongo:latest
    container_name: mongodb-prod
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: epita
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-mongo_production_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-prod_mongo_secure_pwd}
    networks:
      - app-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  mongodb_backup:
    image: mongo:latest
    container_name: mongodb-backup
    volumes:
      - mongodb_backup_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: epita
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-mongo_production_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-prod_mongo_secure_pwd}
    networks:
      - app-network
    restart: always
    depends_on:
      - mongodb
    command: mongod --replSet rs0 --port 27018

  postgres:
    image: postgres:13-alpine
    container_name: postgres-prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres_prod_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prod_pg_secure_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-movies}
    networks:
      - app-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  postgres_replica:
    image: postgres:13-alpine
    container_name: postgres-replica
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres_prod_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prod_pg_secure_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-movies}
    networks:
      - app-network
    restart: always
    depends_on:
      - postgres

  redis:
    image: redis:alpine
    container_name: redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD:-prod_redis_secure_pwd}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # Nginx for load balancing
  nginx:
    image: nginx:alpine
    container_name: nginx-load-balancer
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    networks:
      - app-network
    restart: always

volumes:
  mongodb_data:
  mongodb_backup_data:
  postgres_data:
  postgres_replica_data:
  redis_data:

networks:
  app-network:
    driver: bridge