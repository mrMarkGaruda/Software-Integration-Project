version: '3.8'

services:
  app:
    container_name: movie-app-pprod
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
      args:
        NODE_ENV: production
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
    env_file:
      - .env.pprod
    depends_on:
      - mongo
      - postgres
      - redis
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  mongo:
    image: mongo:latest
    container_name: mongo-pprod
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: epita
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-mongo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-pprod_mongo_pwd}
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 1G
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express-pprod
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME:-mongo_user}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-pprod_mongo_pwd}
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pprod_admin
      ME_CONFIG_SITE_SSL_ENABLED: "false"
    networks:
      - app-network
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  postgres:
    image: postgres:13-alpine
    container_name: postgres-pprod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pprod_pg_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-movies}
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 1G

  # Redis for caching in pre-production
  redis:
    image: redis:alpine
    container_name: redis-pprod
    command: redis-server --requirepass ${REDIS_PASSWORD:-pprod_redis_pwd}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mongo_data:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
